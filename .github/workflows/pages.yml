name: Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          # 自动缓存 npm 依赖，加速构建
          cache: 'npm' 

      - name: Install Dependencies
        run: npm install 

      - name: Build VitePress Site
        # 这会生成 .vitepress/dist 目录
        run: npm run build 
        env:
          # 设置基础路径，确保资源加载正确
          # 如果你的仓库名是 yourname.github.io，base 应该是 "/"
          # 如果你的仓库名是 blog，base 应该是 "/blog/"
          BASE: /colirx.github.io/ 

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 关键修改：VitePress 默认构建到 .vitepress/dist
          path: ./docs/.vitepress/dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4